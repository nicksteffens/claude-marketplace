name: Generate Personality Index

on:
  pull_request:
    paths:
      - 'plugins/claude-personalities/personalities/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate PERSONALITIES.md
        run: node plugins/claude-personalities/scripts/generate-index.js

      - name: Commit if changed
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git fetch origin ${{ github.head_ref }}
          git checkout ${{ github.head_ref }}
          node plugins/claude-personalities/scripts/generate-index.js
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/claude-personalities/PERSONALITIES.md
          git diff --cached --quiet || git commit -m "docs: auto-generate personality index"
          git push
